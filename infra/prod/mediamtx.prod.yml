# MediaMTX Configuration for dStream (PROD)
logLevel: info

# Authentication (Webhook to Next.js API)
# Internal Docker DNS: 'web' is the service name
authMethod: http
authHTTPAddress: http://web:3000/api/auth/publish

# HLS settings
hls: yes
hlsAddress: :8880
hlsDirectory: /hls
hlsSegmentDuration: 4s
hlsPartDuration: 1s
hlsSegmentCount: 7
hlsAlwaysRemux: yes
hlsAllowOrigins: [ "*" ]

# WebRTC/WHIP settings
webrtc: yes
webrtcAddress: :8881
webrtcICEUDPMuxAddress: :8181
webrtcAllowOrigins: [ "*" ]
webrtcAdditionalHosts: [ "dstream.stream", "www.dstream.stream" ]

# Paths
paths:
  # Catch-all for dynamic stream keys (PROD)
  "~^.*$":
    source: publisher
